<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footer Preview</title>
<style>
  :root {
    --navy: #07111f;
    --blue: #4a86ff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #eef4ff; }

  .site-footer {
    background: var(--navy);
    color: #b7c0d1;
    padding: 48px 32px 0;
    font-size: 13.5px;
  }
  .footer-centered {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .footer-inner-centered {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding-bottom: 36px;
    text-align: center;
  }
  .footer-centered h4 {
    color: #fff;
    font-size: 18px;
    margin: 0 0 18px;
  }
  .footer-contact.centered {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .footer-contact.centered li {
    display: inline-flex;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
    width: auto;
    max-width: 100%;
    font-size: 15.5px;
    line-height: 1.55;
    margin-bottom: 16px;
    color: #9aa4b8;
  }
  .footer-contact.centered li:last-child { margin-bottom: 0; }
  .footer-contact.centered svg { width: 18px; height: 18px; margin-top: 1px; flex-shrink: 0; color: var(--blue); }
  .footer-contact.centered a { color: #9aa4b8; transition: color 0.15s; }
  .footer-contact.centered a:hover { color: #fff; }

  .footer-social-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-top: 18px;
  }
  .footer-social-wrap h5 {
    margin: 0;
    color: #fff;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .footer-social.centered {
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  .footer-social.centered a {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 10px 20px rgba(7, 17, 31, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    transition: background 0.15s, transform 0.15s;
  }
  .footer-social.centered a:hover {
    background: var(--blue);
    transform: translateY(-2px);
  }
  .footer-bottom {
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding: 20px 0;
    text-align: center;
    color: #7e889c;
    font-size: 13px;
    width: 100%;
  }
</style>
</head>
<body>

<footer class="site-footer footer-centered">

      </div>

    <div class="footer-bottom">

    </div>
  </div>
</footer>

</body>
</html>
